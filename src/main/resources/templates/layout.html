<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">NGO Anderlecht</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Outfit) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <!-- Header / Reusable Navbar -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- NGO Brand Logo -->
                <div class="flex-shrink-0">
                    <a th:href="@{/Index}" class="flex items-center space-x-2">
                        <span class="text-2xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent">NGO Anderlecht</span>
                    </a>
                </div>
                <!-- Navigation Links -->
                <nav class="hidden md:flex space-x-8">
                    <a th:href="@{/Index}" class="text-slate-600 hover:text-emerald-600 font-medium transition duration-200">Evenementen</a>
                    <a th:href="@{/New}" class="text-slate-600 hover:text-emerald-600 font-medium transition duration-200">Nieuw Evenement</a>
                    <a th:href="@{/About}" class="text-slate-600 hover:text-emerald-600 font-medium transition duration-200">Over Ons</a>
                    <a th:href="@{/Contact}" class="text-slate-600 hover:text-emerald-600 font-medium transition duration-200">Contact</a>
                </nav>
                <!-- Mobile Navigation Button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-slate-600 hover:text-emerald-600 focus:outline-none">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Dropdown Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-200 px-4 pt-2 pb-4 space-y-1">
            <a th:href="@{/Index}" class="block px-3 py-2 rounded-md text-base font-medium text-slate-700 hover:text-emerald-600 hover:bg-slate-50 transition duration-150">Evenementen</a>
            <a th:href="@{/New}" class="block px-3 py-2 rounded-md text-base font-medium text-slate-700 hover:text-emerald-600 hover:bg-slate-50 transition duration-150">Nieuw Evenement</a>
            <a th:href="@{/About}" class="block px-3 py-2 rounded-md text-base font-medium text-slate-700 hover:text-emerald-600 hover:bg-slate-50 transition duration-150">Over Ons</a>
            <a th:href="@{/Contact}" class="block px-3 py-2 rounded-md text-base font-medium text-slate-700 hover:text-emerald-600 hover:bg-slate-50 transition duration-150">Contact</a>
        </div>
    </header>

    <!-- Main Content Injection Area -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div th:replace="${content}"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row justify-between items-center">
            <p class="text-sm">&copy; 2026 NGO Anderlecht. Alle rechten voorbehouden.</p>
            <p class="text-xs text-slate-500 mt-2 sm:mt-0">Bouwen aan een warmere gemeenschap in Anderlecht</p>
        </div>
    </footer>

    <!-- Mobile Menu Toggle Script -->
    <script>
        const btn = document.getElementById('mobile-menu-button');
        const menu = document.getElementById('mobile-menu');
        if (btn && menu) {
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
            });
        }
    </script>
</body>
</html>
