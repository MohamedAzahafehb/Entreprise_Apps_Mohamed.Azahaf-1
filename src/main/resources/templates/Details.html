<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Details Evenement - NGO Anderlecht</title>
</head>
<body>
    <div th:fragment="content" class="max-w-4xl mx-auto space-y-6 animate-fade-in">
        <!-- Breadcrumb -->
        <div>
            <a th:href="@{/Index}" class="text-sm font-semibold text-emerald-600 hover:text-emerald-700 flex items-center space-x-1 transition duration-150">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Terug naar Overzicht</span>
            </a>
            <h1 class="text-3xl font-bold text-slate-900 mt-2">Details Evenement</h1>
        </div>

        <!-- Main Details Grid Card -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden grid grid-cols-1 md:grid-cols-3">
            <!-- Left 2/3: Event Content -->
            <div class="p-6 sm:p-8 md:col-span-2 space-y-6">
                <!-- Title & Date -->
                <div>
                    <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100/50 mb-3" th:text="${evenement.organisatie}">
                        Organisatie
                    </span>
                    <h2 class="text-2xl font-bold text-slate-950 leading-tight" th:text="${evenement.titel}">Titel Evenement</h2>
                    <div class="mt-2 flex items-center text-sm text-slate-500 space-x-2">
                        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <span th:text="${#temporals.format(evenement.tijdstip, 'EEEE d MMMM yyyy, HH:mm')}">Datum & Tijd</span>
                    </div>
                </div>

                <!-- Description -->
                <div class="space-y-2 border-t border-slate-100 pt-6">
                    <h3 class="text-sm font-semibold text-slate-900">Omschrijving</h3>
                    <p class="text-slate-600 leading-relaxed text-sm whitespace-pre-line" th:text="${evenement.omschrijving}">
                        Omschrijving van het evenement.
                    </p>
                </div>

                <!-- Contact person mail -->
                <div class="space-y-2 border-t border-slate-100 pt-6">
                    <h3 class="text-sm font-semibold text-slate-900">Contactpersoon</h3>
                    <div class="flex items-center space-x-2 text-sm text-slate-600">
                        <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <a th:href="'mailto:' + ${evenement.mailadres}" class="text-emerald-600 hover:text-emerald-700 font-medium underline" th:text="${evenement.mailadres}">e-mailadres</a>
                    </div>
                </div>
            </div>

            <!-- Right 1/3: Location info card with teal/slate accent -->
            <div class="bg-slate-50 border-t md:border-t-0 md:border-l border-slate-200 p-6 sm:p-8 space-y-6">
                <div>
                    <h3 class="text-md font-bold text-slate-900 flex items-center space-x-2">
                        <svg class="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span>Locatiegegevens</span>
                    </h3>
                </div>

                <div class="space-y-4">
                    <!-- Location Name -->
                    <div>
                        <span class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Naam</span>
                        <span class="text-sm font-semibold text-slate-900" th:text="${evenement.locatie.naam}">Locatienaam</span>
                    </div>

                    <!-- Address -->
                    <div>
                        <span class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Adres</span>
                        <span class="text-sm text-slate-600" th:text="${evenement.locatie.adres}">Locatie-adres</span>
                    </div>

                    <!-- Capacity -->
                    <div>
                        <span class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Capaciteit</span>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium bg-slate-100 text-slate-800 border border-slate-200 mt-1">
                            <span th:text="${evenement.locatie.capaciteit}">100</span>&nbsp;personen
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
