<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Nieuwe Locatie Toevoegen - NGO Anderlecht</title>
</head>
<body>
    <div th:fragment="content" class="max-w-2xl mx-auto space-y-6 animate-fade-in">
        <!-- Breadcrumb / Header -->
        <div>
            <a th:href="@{/New}" class="text-sm font-semibold text-emerald-600 hover:text-emerald-700 flex items-center space-x-1 transition duration-150">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Terug naar Evenement Aanmaken</span>
            </a>
            <h1 class="text-3xl font-bold text-slate-900 mt-2">Nieuwe Locatie Toevoegen</h1>
            <p class="text-slate-500 text-sm mt-1">Voeg een nieuwe locatie toe zodat deze geselecteerd kan worden voor evenementen.</p>
        </div>

        <!-- Location Form Card -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 sm:p-8">
            <form th:action="@{/locatie/new}" method="post" class="space-y-6" th:object="${locatie}">
                <!-- Name Field -->
                <div>
                    <label for="naam" class="block text-sm font-semibold text-slate-700">Naam Locatie *</label>
                    <input type="text" id="naam" name="naam" th:value="${locatie?.naam}"
                           class="mt-1 block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 shadow-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/25 transition duration-150" 
                           placeholder="Bijv. Buurtlokaal Kuregem" required>
                    <p th:if="${err_naam}" class="mt-1 text-xs font-semibold text-red-600" th:text="${err_naam}"></p>
                </div>

                <!-- Address Field -->
                <div>
                    <label for="adres" class="block text-sm font-semibold text-slate-700">Adres *</label>
                    <input type="text" id="adres" name="adres" th:value="${locatie?.adres}"
                           class="mt-1 block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 shadow-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/25 transition duration-150" 
                           placeholder="Bijv. Nijverheidskaai 170, 1070 Anderlecht" required>
                    <p th:if="${err_adres}" class="mt-1 text-xs font-semibold text-red-600" th:text="${err_adres}"></p>
                </div>

                <!-- Capacity Field -->
                <div>
                    <label for="capaciteit" class="block text-sm font-semibold text-slate-700">Capaciteit (aantal personen) *</label>
                    <input type="number" id="capaciteit" name="capaciteit" th:value="${locatie?.capaciteit}" min="1"
                           class="mt-1 block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 shadow-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/25 transition duration-150" 
                           placeholder="Bijv. 100" required>
                    <p th:if="${err_capaciteit}" class="mt-1 text-xs font-semibold text-red-600" th:text="${err_capaciteit}"></p>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row sm:justify-end gap-3 pt-4 border-t border-slate-100">
                    <a th:href="@{/New}" class="w-full sm:w-auto inline-flex justify-center items-center px-6 py-3 border border-slate-300 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 transition duration-200 text-center">
                        Annuleren
                    </a>
                    <button type="submit" class="w-full sm:w-auto inline-flex justify-center items-center px-6 py-3 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-700 hover:to-teal-600 text-white font-semibold rounded-xl transition duration-200 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                        Locatie Opslaan
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
